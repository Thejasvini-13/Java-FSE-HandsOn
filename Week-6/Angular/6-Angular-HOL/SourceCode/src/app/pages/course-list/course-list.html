<h2 class="heading">Available Courses</h2>

<app-course-summary-widget></app-course-summary-widget>

<ng-container *ngIf="courses.length > 0; else noCourses">
  <div class="courseContainer">
    <app-course-card *ngFor="let course of courses; let i = index; trackBy: trackByCourseId" 
                     [course]="course" 
                     (enrollRequested)="onEnroll($event)"
                     appHighlight="lightblue">
    </app-course-card>
  </div>
</ng-container>

<ng-template #noCourses>
  <p>No courses available.</p>
</ng-template>

<p *ngIf="selectedCourseId">Selected course ID: {{ selectedCourseId }}</p>
