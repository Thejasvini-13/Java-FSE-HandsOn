<div class="form-container">
  <h2 class="heading">Enrollment Request</h2>
  
  <div *ngIf="submitted" class="success-message">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
    
    <div class="form-group">
      <label for="studentName">Student Name:</label>
      <input type="text" id="studentName" name="studentName" ngModel required minlength="3" #nameCtrl="ngModel">
      <div class="error-container">
        <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required</span>
        <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span>
      </div>
    </div>

    <div class="form-group">
      <label for="studentEmail">Email:</label>
      <input type="email" id="studentEmail" name="studentEmail" ngModel required email #emailCtrl="ngModel">
      <div class="error-container">
        <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">Email is required</span>
        <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">Invalid email format</span>
      </div>
    </div>

    <div class="form-group">
      <label for="courseId">Course ID:</label>
      <input type="number" id="courseId" name="courseId" ngModel required #courseCtrl="ngModel">
      <div class="error-container">
        <span class="error" *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">Course ID is required</span>
      </div>
    </div>

    <div class="form-group">
      <label for="preferredSemester">Preferred Semester:</label>
      <select id="preferredSemester" name="preferredSemester" ngModel>
        <option value="" disabled selected>Select a semester</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="form-group checkbox-group">
      <input type="checkbox" id="agreeToTerms" name="agreeToTerms" ngModel required #termsCtrl="ngModel">
      <label for="agreeToTerms">I agree to the terms and conditions</label>
      <div class="error-container">
        <span class="error" *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">You must agree to the terms</span>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" class="btn-reset" (click)="enrollForm.resetForm(); submitted = false">Reset</button>
    </div>
  </form>
</div>
